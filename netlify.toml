# Netlify deploy config for the Storybook site (storybook.manti.design).
# Used by the Netlify site whose "Base directory" is the repo root. The docs
# site (manti.design) lives at packages/docs and uses packages/docs/netlify.toml.
#
# `pnpm build` builds all packages first, then emits Storybook into
# `storybook-static/`.
[build]
  command = "pnpm build"
  publish = "storybook-static"

[build.environment]
  # Repo requires Node >=22.12.0 (see package.json engines); "22" resolves to
  # the latest 22.x LTS, which satisfies it.
  NODE_VERSION = "22"
  # pnpm version is pinned via the root package.json `packageManager` field,
  # which Netlify honors through Corepack.
  STORYBOOK_DISABLE_TELEMETRY = "1"
